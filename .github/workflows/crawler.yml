name: 自动爬取财政部处罚数据

on:
  # 每天北京时间早上8点运行 (UTC 0点)
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4

    - name: 读取 ai_analyses.json 文件
      id: ai_analysis
      run: |
        if [ -f "ai_analyses.json" ]; then
          echo "已找到 ai_analyses.json"
          echo "ai_data_exists=true" >> $GITHUB_OUTPUT
        else
          echo "ai_analyses.json 不存在，跳过 AI 分析合并"
          echo "ai_data_exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: 运行爬虫
      run: |
        python mof_crawler.py
    
    - name: 更新 HTML 内嵌数据
      run: |
        python << 'EOF'
        import json
        import re
        import os

        # ========== 读取 ai_analyses.json（浏览器推送的 AI 分析结果） ==========
        gist_ai_map = {}
        if os.path.exists('ai_analyses.json'):
            try:
                with open('ai_analyses.json', 'r', encoding='utf-8') as f:
                    ai_data = json.load(f)
                for e in ai_data.get('entries', []):
                    href = e.get('href', '')
                    if href and e.get('aiAnalysis'):
                        gist_ai_map[href] = e['aiAnalysis']
                print(f"[INFO] 从 ai_analyses.json 读取到 {len(gist_ai_map)} 条 AI 分析结果")
            except Exception as ge:
                print(f"[WARN] 解析 ai_analyses.json 失败: {ge}")
        else:
            print("[INFO] ai_analyses.json 不存在，跳过")

        # 读取爬取的最新数据
        with open('mof_penalty_data.json', 'r', encoding='utf-8') as f:
            new_data = json.load(f)
        
        # 更新 mof_latest.html
        with open('mof_latest.html', 'r', encoding='utf-8') as f:
            html_content = f.read()
        
        # 替换 EMBEDDED_DATA
        json_str = json.dumps(new_data, ensure_ascii=False, indent=2)
        pattern = r'const\s+EMBEDDED_DATA\s*=\s*\{[\s\S]*?\};'
        replacement = f'const EMBEDDED_DATA = {json_str};'
        html_content = re.sub(pattern, replacement, html_content)
        
        with open('mof_latest.html', 'w', encoding='utf-8') as f:
            f.write(html_content)
        
        print("[OK] mof_latest.html 已更新")
        
        # 更新 mof_archive.html - 合并新旧数据
        with open('mof_archive.html', 'r', encoding='utf-8') as f:
            archive_html = f.read()
        
        # 用括号匹配方式提取现有的 EMBEDDED_ARCHIVE_DATA（可靠，不受 raw newline 影响）
        KEYWORD = 'const EMBEDDED_ARCHIVE_DATA'
        key_start = archive_html.find(KEYWORD)
        existing_entries = []
        existing_snapshots = []
        
        if key_start != -1:
            brace_start = archive_html.find('{', key_start)
            if brace_start != -1:
                # 用栈匹配括号
                depth = 0
                json_end = -1
                for i in range(brace_start, len(archive_html)):
                    c = archive_html[i]
                    if c == '{':
                        depth += 1
                    elif c == '}':
                        depth -= 1
                        if depth == 0:
                            json_end = i
                            break
                if json_end != -1:
                    json_str = archive_html[brace_start:json_end+1]
                    try:
                        existing_data = json.loads(json_str)
                        existing_entries = existing_data.get('allEntries', [])
                        existing_snapshots = existing_data.get('snapshots', [])
                        print(f"[INFO] 现有数据: {len(existing_entries)} 条记录")
                    except Exception as ex:
                        print(f"[WARN] 无法解析现有数据: {ex}，将保留旧数据继续合并")
        
        # 合并数据：新数据 + 旧数据（按URL去重）
        new_entries = new_data.get("filtered", [])
        existing_urls = {e.get('href', '') for e in existing_entries}
        
        # 建立旧数据的 URL -> aiAnalysis 映射，用于复用 AI 分析结果
        existing_ai_map = {e.get('href', ''): e.get('aiAnalysis', '') for e in existing_entries if e.get('aiAnalysis')}

        # 将 Gist 中的 AI 分析结果也合并进来（优先用已有的）
        gist_injected = 0
        for entry in existing_entries:
            url = entry.get('href', '')
            if not entry.get('aiAnalysis') and url in gist_ai_map:
                entry['aiAnalysis'] = gist_ai_map[url]
                gist_injected += 1
                print(f"[INFO] 从 Gist 注入 AI 分析: {entry.get('title', '')[:30]}...")

        # 只添加不存在的新条目
        added_count = 0
        for entry in new_entries:
            url = entry.get('href', '')
            if url not in existing_urls:
                entry['_date'] = new_data.get('dateA', '')
                # 优先复用旧分析，其次从 Gist 补充
                if url in existing_ai_map and existing_ai_map[url]:
                    entry['aiAnalysis'] = existing_ai_map[url]
                    print(f"[INFO] 复用已有 AI 分析: {entry.get('title', '')[:30]}...")
                elif url in gist_ai_map and gist_ai_map[url]:
                    entry['aiAnalysis'] = gist_ai_map[url]
                    print(f"[INFO] 从 Gist 补充 AI 分析: {entry.get('title', '')[:30]}...")
                existing_entries.append(entry)
                added_count += 1

        if gist_injected > 0:
            print(f"[INFO] 合计从 Gist 注入 {gist_injected} 条分析结果")
        
        print(f"[INFO] 新增 {added_count} 条记录，总共 {len(existing_entries)} 条")
        
        # 添加新快照
        new_snapshot = {
            "dateA": new_data.get("dateA", ""),
            "savedAt": new_data.get("cachedAt", ""),
            "count": len(new_entries)
        }
        existing_snapshots.insert(0, new_snapshot)
        
        # 限制快照数量（保留最近30个）
        if len(existing_snapshots) > 30:
            existing_snapshots = existing_snapshots[:30]
        
        # 构建新的 archive 数据
        archive_data = {
            "allEntries": existing_entries,
            "snapshots": existing_snapshots,
            "lastUpdated": new_data.get("cachedAt", "")
        }
        archive_json = json.dumps(archive_data, ensure_ascii=False, indent=None, separators=(',', ':'))
        
        # 用括号匹配方式替换 EMBEDDED_ARCHIVE_DATA（可靠）
        if key_start != -1 and brace_start != -1 and json_end != -1:
            # 找 } 后的分号位置
            semicolon_pos = json_end + 1
            while semicolon_pos < len(archive_html) and archive_html[semicolon_pos] in ' \t\n\r':
                semicolon_pos += 1
            # 构建替换内容
            replacement = KEYWORD + ' = ' + archive_json + ';'
            archive_html = archive_html[:key_start] + replacement + archive_html[semicolon_pos + 1:]
            print("[OK] mof_archive.html 数据已合并更新")
        else:
            # 未找到现有数据，直接添加
            insert_script = "const EMBEDDED_ARCHIVE_DATA = " + archive_json + ";"
            archive_html = archive_html.replace('<script>', '<script>\n' + insert_script)
            print("[OK] mof_archive.html 已添加新数据")
        
        with open('mof_archive.html', 'w', encoding='utf-8') as f:
            f.write(archive_html)
        print("[OK] mof_archive.html 写入完成")
        EOF
    
    - name: 提交更改
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add mof_penalty_data.json mof_latest.html mof_archive.html ai_analyses.json
        git diff --staged --quiet || (git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')" && git push)
