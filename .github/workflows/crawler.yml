name: 自动爬取财政部处罚数据

on:
  # 每天北京时间早上8点运行 (UTC 0点)
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4
    
    - name: 运行爬虫
      run: |
        python mof_crawler.py
    
    - name: 更新 HTML 内嵌数据
      run: |
        python << 'EOF'
        import json
        import re
        
        # 读取爬取的最新数据
        with open('mof_penalty_data.json', 'r', encoding='utf-8') as f:
            new_data = json.load(f)
        
        # 更新 mof_latest.html
        with open('mof_latest.html', 'r', encoding='utf-8') as f:
            html_content = f.read()
        
        # 替换 EMBEDDED_DATA
        json_str = json.dumps(new_data, ensure_ascii=False, indent=2)
        pattern = r'const\s+EMBEDDED_DATA\s*=\s*\{[\s\S]*?\};'
        replacement = f'const EMBEDDED_DATA = {json_str};'
        html_content = re.sub(pattern, replacement, html_content)
        
        with open('mof_latest.html', 'w', encoding='utf-8') as f:
            f.write(html_content)
        
        print("[OK] mof_latest.html 已更新")
        
        # 更新 mof_archive.html - 合并新旧数据
        with open('mof_archive.html', 'r', encoding='utf-8') as f:
            archive_html = f.read()
        
        # 提取现有的 EMBEDDED_ARCHIVE_DATA
        existing_entries = []
        existing_snapshots = []
        archive_match = re.search(r'const\s+EMBEDDED_ARCHIVE_DATA\s*=\s*(\{[\s\S]*?\n\});', archive_html)
        
        if archive_match:
            try:
                existing_data = json.loads(archive_match.group(1))
                existing_entries = existing_data.get('allEntries', [])
                existing_snapshots = existing_data.get('snapshots', [])
                print(f"[INFO] 现有数据: {len(existing_entries)} 条记录")
            except:
                print("[WARN] 无法解析现有数据，将创建新数据")
        
        # 合并数据：新数据 + 旧数据（按URL去重）
        new_entries = new_data.get("filtered", [])
        existing_urls = {e.get('href', '') for e in existing_entries}
        
        # 建立旧数据的 URL -> aiAnalysis 映射，用于复用 AI 分析结果
        existing_ai_map = {e.get('href', ''): e.get('aiAnalysis', '') for e in existing_entries if e.get('aiAnalysis')}
        
        # 只添加不存在的新条目
        added_count = 0
        for entry in new_entries:
            url = entry.get('href', '')
            if url not in existing_urls:
                entry['_date'] = new_data.get('dateA', '')
                # 如果有相同 URL 的旧 AI 分析结果，复用它
                if url in existing_ai_map and existing_ai_map[url]:
                    entry['aiAnalysis'] = existing_ai_map[url]
                    print(f"[INFO] 复用 AI 分析: {entry.get('title', '')[:30]}...")
                existing_entries.append(entry)
                added_count += 1
        
        print(f"[INFO] 新增 {added_count} 条记录，总共 {len(existing_entries)} 条")
        
        # 添加新快照
        new_snapshot = {
            "dateA": new_data.get("dateA", ""),
            "savedAt": new_data.get("cachedAt", ""),
            "count": len(new_entries)
        }
        existing_snapshots.insert(0, new_snapshot)  # 新快照放前面
        
        # 限制快照数量（保留最近30个）
        if len(existing_snapshots) > 30:
            existing_snapshots = existing_snapshots[:30]
        
        # 构建新的 archive 数据
        archive_data = {
            "allEntries": existing_entries,
            "snapshots": existing_snapshots,
            "lastUpdated": new_data.get("cachedAt", "")
        }
        archive_json = json.dumps(archive_data, ensure_ascii=False, indent=2)
        
        # 替换 EMBEDDED_ARCHIVE_DATA
        if 'const EMBEDDED_ARCHIVE_DATA' in archive_html:
            pattern = r'const\s+EMBEDDED_ARCHIVE_DATA\s*=\s*\{[\s\S]*?\n\};'
            replacement = f'const EMBEDDED_ARCHIVE_DATA = {archive_json};'
            new_html = re.sub(pattern, replacement, archive_html)
            if new_html != archive_html:
                archive_html = new_html
                print("[OK] mof_archive.html 数据已合并更新")
            else:
                # 备用方案
                pattern2 = r'(const\s+EMBEDDED_ARCHIVE_DATA\s*=\s*)\{[\s\S]*?\}(;)'
                replacement2 = r'\1' + archive_json + r'\2'
                archive_html = re.sub(pattern2, replacement2, archive_html)
                print("[OK] mof_archive.html 数据已更新（备用方案）")
        else:
            # 添加新的内嵌数据
            insert_script = "// 内嵌历史数据（自动更新）\nconst EMBEDDED_ARCHIVE_DATA = " + archive_json + ";\n"
            archive_html = archive_html.replace('<script>', '<script>\n' + insert_script)
            print("[OK] mof_archive.html 已添加新数据")
        
        with open('mof_archive.html', 'w', encoding='utf-8') as f:
            f.write(archive_html)
        print("[OK] mof_archive.html 写入完成")
        EOF
    
    - name: 提交更改
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add mof_penalty_data.json mof_latest.html mof_archive.html
        git diff --staged --quiet || (git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')" && git push)
