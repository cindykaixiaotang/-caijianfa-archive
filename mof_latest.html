<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>财政部 · 行政处罚决定书</title>
  <style>
    :root {
      --red: #c0392b;
      --red-light: #fadbd8;
      --red-dark: #96281b;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #2c3e50;
      --sub: #7f8c8d;
      --border: #eaecf0;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 100%);
      color: #fff;
      padding: 28px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 10px rgba(192,57,43,0.35);
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.18);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .header-sub { font-size: 13px; opacity: 0.82; margin-top: 3px; }
    .header-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .sync-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #fff;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .sync-btn:hover { background: rgba(255,255,255,0.25); }
    .sync-btn.synced { color: #a8f0c0; }
    .sync-btn.error { color: #ffd0d0; }

    /* ========== 设置面板 ========== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 9999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: #fff; border-radius: 16px;
      padding: 32px; max-width: 520px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-card h3 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
    .modal-card p { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
    .modal-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .modal-card input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: monospace;
      margin-bottom: 16px; box-sizing: border-box;
    }
    .modal-card input:focus { outline: none; border-color: var(--red); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-primary {
      background: var(--red); color: #fff; border: none;
      padding: 9px 22px; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-ghost {
      background: transparent; color: var(--sub); border: 1px solid var(--border);
      padding: 9px 18px; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .modal-status { font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
    .modal-status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .modal-status.error { display: block; background: #ffebee; color: var(--red); }
    .modal-status.info { display: block; background: #fff8e1; color: #5d4037; }
    .hint-box {
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 8px; padding: 12px 14px; font-size: 12px;
      color: #5d4037; margin-bottom: 18px; line-height: 1.6;
    }
    .hint-box a { color: var(--red); }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Main */
    main { max-width: 900px; margin: 36px auto; padding: 0 20px; }

    /* ===== 信息卡 ===== */
    .info-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 20px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .info-left { display: flex; align-items: center; gap: 14px; }
    .date-chip {
      background: var(--red);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 20px;
    }
    .info-count { font-size: 14px; color: var(--text); }
    .info-count strong { color: var(--red); font-size: 18px; }

    /* ===== 参考条目（第一条）====== */
    .ref-entry {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 18px 24px;
      margin-bottom: 20px;
    }
    .ref-label {
      font-size: 11px;
      color: #fff;
      background: var(--red);
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 10px;
    }
    .ref-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .ref-date { font-size: 13px; color: var(--sub); }

    /* ===== 筛选结果列表 ===== */
    .entry-list { display: flex; flex-direction: column; gap: 12px; }

    .entry-card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .entry-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }
    .entry-num {
      flex-shrink: 0;
      width: 32px; height: 32px;
      background: var(--red-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: var(--red);
      margin-top: 2px;
    }
    .entry-num.n1 {
      background: var(--red);
      color: #fff;
    }
    .entry-body { flex: 1; min-width: 0; }
    .entry-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .entry-title a {
      color: inherit;
      text-decoration: none;
    }
    .entry-title a:hover { color: var(--red); }
    .entry-meta {
      font-size: 12px;
      color: var(--sub);
      background: #f5f6fa;
      border-radius: 6px;
      padding: 3px 10px;
      display: inline-block;
    }
    .entry-actions { margin-top: 10px; }
    .btn-goto {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--red); color: #fff;
      text-decoration: none; border-radius: 7px;
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      transition: background 0.2s;
    }
    .btn-goto:hover { background: var(--red-dark); }

    /* 滚动窗格 - 检查发现的主要问题 */
    .issues-box {
      margin-top: 10px;
      padding: 10px 12px;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 8px;
      border-left: 3px solid #6c757d;
    }
    .issues-label {
      font-size: 11px;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .issues-content {
      font-size: 13px;
      color: #495057;
      line-height: 1.6;
      max-height: 72px; /* 默认3行高度 */
      overflow-y: auto;
      overflow-x: hidden;
      transition: max-height 0.3s ease;
      word-break: break-all;
    }
    .issues-content.expanded {
      max-height: 500px;
    }
    /* 违规分析内容框样式（默认3行高度） */
    .violation-content {
      font-size: 13px;
      color: #2d3436;
      line-height: 1.8;
      padding: 8px;
      background: #fff;
      border-radius: 6px;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 72px;
      overflow-y: auto;
      transition: max-height 0.3s ease;
    }
    .violation-content.expanded {
      max-height: 500px;
    }
    .issues-toggle {
      font-size: 11px;
      color: #868e96;
      cursor: pointer;
      margin-top: 6px;
      display: inline-block;
    }
    .issues-toggle:hover { color: var(--red); }

    /* 刷新按钮 */
    .btn-refresh {
      display: flex; align-items: center; gap: 6px;
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-refresh:hover { background: var(--red-dark); }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh svg { transition: transform 0.5s; }
    .btn-refresh.loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 18px 24px;
      display: flex; align-items: flex-start; gap: 16px;
      margin-bottom: 12px;
    }
    .sk-circle { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .sk-body { flex: 1; }
    .sk-line { height: 14px; margin-bottom: 8px; }
    .sk-line.short { width: 40%; }

    /* Error */
    .error-block {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      padding: 40px 20px;
      color: var(--sub);
    }
    .error-block .err-icon { font-size: 42px; margin-bottom: 12px; }
    .error-block p { font-size: 15px; }
    .error-block small { font-size: 12px; color: #bdc3c7; display: block; margin-top: 6px; }

    /* 定时刷新 */
    .schedule-card {
      margin-top: 20px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .schedule-left { display: flex; align-items: center; gap: 12px; }
    .schedule-icon {
      width: 40px; height: 40px;
      background: var(--red-light);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--red); font-size: 20px;
    }
    .schedule-title { font-size: 14px; font-weight: 600; }
    .schedule-desc { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .countdown { font-size: 13px; color: var(--sub); text-align: right; }
    .countdown strong { color: var(--red); font-size: 15px; }

    footer {
      text-align: center;
      color: var(--sub);
      font-size: 12px;
      padding: 24px;
    }
    footer a { color: var(--sub); }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--sub);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-ok { background: #2ecc71; }
    .status-err { background: #e74c3c; }
    .status-loading { background: #f39c12; animation: pulse 1s infinite; }

    /* 同步状态 */
    .sync-status {
      margin-top: 12px;
      padding: 10px 16px;
      background: #e8f5e9;
      border-radius: 8px;
      font-size: 12px;
      color: #2e7d32;
      display: none;
    }
    .sync-status.show { display: flex; align-items: center; gap: 6px; }
    .sync-status .sync-icon { font-size: 14px; }
  </style>
</head>
<body>

<header>
    <div class="header-left">
      <div class="header-icon">🏛️</div>
      <div>
        <div class="header-title">财政部 · 行政处罚决定书</div>
        <div class="header-sub">
          <a href="https://www.mof.gov.cn/gp/xxgkml/index.htm" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dashed rgba(255,255,255,0.5);">
            中华人民共和国财政部 · 法定主动公开内容
          </a>
        </div>
      </div>
    </div>
  <div class="header-badge">
    <div class="dot"></div>
    每日 08:00 自动刷新
    <button class="sync-btn" id="syncBtn" title="AI 分析同步设置" onclick="openSyncModal()">
      <span id="syncBtnIcon">☁️</span>
      <span id="syncBtnText">同步设置</span>
    </button>
  </div>
</header>

<!-- 同步设置弹窗 -->
<div class="modal-overlay" id="syncModal">
  <div class="modal-card">
    <h3>☁️ AI 分析同步到 GitHub</h3>
    <p>将你的 AI 分析结果直接推送至 GitHub 仓库，下一次 GitHub Actions 运行时自动合并到归档页面。</p>

    <div class="hint-box">
      <strong>注意：</strong>Token 需要有 <code>repo</code> 权限（不是 Gist）。<br/>
      若尚未创建：<a href="https://github.com/settings/tokens" target="_blank">去创建 Token</a>，
      勾选 <code>repo</code>。
    </div>

    <label>GitHub Token（PAT，需有 repo 权限）</label>
    <input type="password" id="gistToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />

    <label>GitHub Gist ID</label>
    <input type="text" id="gistId" placeholder="例：a1b2c3d4e5f6g7h8..." />

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeSyncModal()">取消</button>
      <button class="btn-primary" onclick="saveAndSync()">保存并同步</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<main>
  <!-- 顶部汇总栏 -->
  <div class="info-card" id="infoCard">
    <div class="info-left">
      <div class="skeleton" style="width:180px;height:32px;border-radius:16px;"></div>
    </div>
    <button class="btn-refresh" id="refreshBtn" onclick="fetchData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      立即刷新
    </button>
  </div>

  <!-- 参考条目（第一条的标题和日期） -->
  <div class="ref-entry" id="refEntry" style="display:none;"></div>

  <!-- 筛选结果列表 -->
  <div class="entry-list" id="entryList"></div>

  <!-- 同步状态 -->
  <div class="sync-status" id="syncStatus">
    <span class="sync-icon">🔄</span>
    <span id="syncMsg">同步中...</span>
  </div>

  <!-- 定时刷新说明 -->
  <div class="schedule-card">
    <div class="schedule-left">
      <div class="schedule-icon">⏰</div>
      <div>
        <div class="schedule-title">定时自动刷新</div>
        <div class="schedule-desc">每天上午 08:00 自动获取最新发文</div>
      </div>
    </div>
    <div class="countdown">
      距下次刷新：<strong id="countdown">计算中…</strong>
    </div>
  </div>
</main>

<footer>
  数据来源：<a href="https://www.mof.gov.cn/gp/xxgkml/index.htm" target="_blank">中华人民共和国财政部</a> &nbsp;·&nbsp;
  仅供信息展示，内容以官网为准
</footer>

<script>
// ============================================================
//  配置
// ============================================================
const PROXY_LIST = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://proxy.cors.sh/${url}`,
];
const IFRAME_URL = 'https://www.mof.gov.cn/gp/xxgkml/index_8254.htm';
const BASE_URL  = 'https://www.mof.gov.cn/gp/xxgkml/';
const CACHE_KEY = 'mof_latest_filtered';
const FETCH_HOUR = 8;

// ============================================================
//  localStorage 配置（与归档页共享）
// ============================================================
const STORAGE_KEY = 'mof_history_v1';
const PUSH_TOKEN_KEY = 'mof_push_token';
const REPO_OWNER = 'cindykaixiaotang';
const REPO_NAME = '-caijianfa-archive';
const SYNC_FILE = 'ai_analyses.json';
const SYNC_BRANCH = 'main';

// ============================================================
//  GitHub 仓库直推同步功能
// ============================================================
function openSyncModal() {
  document.getElementById('gistToken').value = localStorage.getItem(PUSH_TOKEN_KEY) || '';
  document.getElementById('modalStatus').className = 'modal-status';
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('syncModal').classList.add('show');
}

function closeSyncModal() {
  document.getElementById('syncModal').classList.remove('show');
}

function showModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.textContent = msg;
  el.className = 'modal-status ' + type;
}

async function saveAndSync() {
  const token = document.getElementById('gistToken').value.trim();
  if (!token) {
    showModalStatus('请填写 GitHub Token', 'error');
    return;
  }
  localStorage.setItem(PUSH_TOKEN_KEY, token);
  showModalStatus('正在同步…', 'info');
  try {
    const pushed = await pushToRepo(token);
    if (pushed) {
      showModalStatus('✅ 同步成功！已推送 ' + pushed + ' 条分析结果到仓库', 'success');
      updateSyncBtn(true);
      setTimeout(closeSyncModal, 1800);
    } else {
      showModalStatus('⚠️ 当前没有需要同步的 AI 分析结果', 'info');
    }
  } catch(e) {
    showModalStatus('❌ 同步失败：' + e.message, 'error');
    updateSyncBtn(false);
  }
}

async function pushToRepo(token) {
  const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"allEntries":[]}');
  const entries = (history.allEntries || []).filter(e => e.aiAnalysis && isAnalysisSuccess(e.aiAnalysis));
  if (entries.length === 0) return 0;
  const content = JSON.stringify({
    updatedAt: new Date().toISOString(),
    entries: entries.map(e => ({ href: e.href, title: e.title, aiAnalysis: e.aiAnalysis }))
  }, null, 2);
  const apiBase = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME;

  // 获取当前 SHA
  let sha = null;
  try {
    const getResp = await fetch(`${apiBase}/contents/${SYNC_FILE}?ref=${SYNC_BRANCH}`, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
    }
  } catch(e) {}

  const encoded = btoa(unescape(encodeURIComponent(content)));
  const payload = {
    message: '同步 AI 分析结果: ' + new Date().toLocaleString('zh-CN'),
    content: encoded,
    branch: SYNC_BRANCH
  };
  if (sha) payload.sha = sha;

  const resp = await fetch(`${apiBase}/contents/${SYNC_FILE}`, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  // 遇到 409 冲突（SHA 过期，被 GitHub Actions 等其他进程抢先更新了）则重试一次
  if (resp.status === 409) {
    // 尝试从 409 响应体解析最新 SHA（GitHub 会返回最新 SHA 在 errors[].message 中）
    let freshSha = null;
    try {
      const errBody = await resp.json();
      const shaMatch = errBody.message && errBody.message.match(/([a-f0-9]{40})/);
      if (shaMatch) freshSha = shaMatch[1];
    } catch(e) {}

    // 如果 409 响应体里没有 SHA，重新获取
    if (!freshSha) {
      try {
        const getResp2 = await fetch(`${apiBase}/contents/${SYNC_FILE}?ref=${SYNC_BRANCH}`, {
          headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
        });
        if (getResp2.ok) {
          const data2 = await getResp2.json();
          freshSha = data2.sha;
        }
      } catch(e) {}
    }

    if (!freshSha) throw new Error('409冲突但无法获取最新SHA，请稍后重试');

    payload.sha = freshSha;
    const resp2 = await fetch(`${apiBase}/contents/${SYNC_FILE}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    if (!resp2.ok) {
      const err = await resp2.json().catch(() => ({}));
      throw new Error(err.message || 'HTTP ' + resp2.status);
    }
    return entries.length;
  }

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.message || 'HTTP ' + resp.status);
  }
  return entries.length;
}

const COZE_PROXY_URL = 'https://406b2dbe-bf7e-4e4b-9714-5815ea471565.dev.coze.site/api/analyze';

// 调用Coze智能体分析违规操作（精炼提取）
async function analyzeViolation(issues, title) {
  const prompt = `# 角色
你是一个专业的资产评估违规分析助手。

# 任务
根据以下财政部行政处罚决定书的"检查发现的主要问题"内容，提取涉及准则和违规点。

政策标题：${title}

检查发现的主要问题：
${issues}

# 约束
- 必须基于最新的官方会计准则进行分析
- 输出必须简练，每个违规点只用一句话概括
- 违规点描述必须通用化，不要包含具体公司名称、具体金额、年份等案例细节
- 只输出涉及准则和违规点，不需要操作描述和合规要求
- 不得编造会计准则内容
- 如有，有几点就写几点

# 参考格式
**【涉及准则】**：《企业会计准则第X号——XX》
**【违规点】**：
- 期末可抵扣亏损不满足递延所得税资产的确认条件，导致多计递延所得税资产
- 客户已存在财务状况恶化、偿债能力不足的事实，应收坏账纳入账龄组合依据不充分`;

  try {
    const response = await fetch(COZE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: prompt })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    // 解析SSE流
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullAnswer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      fullAnswer += chunk;
    }

    return fullAnswer.trim() || '分析失败：未能获取有效结果';
  } catch (error) {
    console.error('调用代理失败:', error);
    return '网络错误，请稍后重试';
  }
}

// 检查分析结果是否成功（不是错误提示）
function isAnalysisSuccess(result) {
  if (!result) return false;
  const errorKeywords = ['网络错误', '请稍后重试', '分析失败', '服务器错误', '请求超时'];
  return !errorKeywords.some(keyword => result.includes(keyword));
}

// AI分析违规操作（带缓存：每条政策只需分析一次，失败可重试）
async function analyzeThis(index) {
  const violationBox = document.getElementById('violation-' + index);
  const contentEl = document.getElementById('violation-content-' + index);
  const loadingEl = document.getElementById('violation-loading-' + index);
  const toggleBtn = document.getElementById('violation-toggle-' + index);

  // 从当前页面数据中获取
  const entry = window.pageData && window.pageData.filtered && window.pageData.filtered[index];
  if (!entry) {
    alert('数据加载中，请稍后重试');
    return;
  }

  // 如果已有成功的缓存结果，直接显示/收起
  if (entry.aiAnalysis && isAnalysisSuccess(entry.aiAnalysis)) {
    if (violationBox.style.display === 'block') {
      // 当前已展开，则收起
      violationBox.style.display = 'none';
      return;
    }
    // 显示缓存结果（无需loading）
    violationBox.style.display = 'block';
    contentEl.style.display = 'block';
    contentEl.textContent = entry.aiAnalysis;
    if (toggleBtn) toggleBtn.textContent = '收起';
    return;
  }

  // 如果已显示但还没缓存（loading刚结束又点了一次），直接返回
  if (violationBox.style.display === 'block' && contentEl.innerHTML.trim() && !entry.aiAnalysis) {
    violationBox.style.display = 'none';
    return;
  }

  const title = entry.title || '';
  const issues = entry.issues || '';

  // 显示分析区域
  violationBox.style.display = 'block';
  contentEl.style.display = 'none';
  loadingEl.style.display = 'block';

  // 调用Coze API分析
  const result = await analyzeViolation(issues, title);

  // 只有分析成功才保存结果
  if (isAnalysisSuccess(result)) {
    // 保存分析结果到数据中，供导出Excel使用
    entry.aiAnalysis = result;

    // ★ 同步写入localStorage，供归档页直接读取（无需再调用AI）
    try {
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"snapshots":[],"allEntries":[]}');
      const entryDate = entry.pubDate || entry._date;
      const target = history.allEntries.find(e => e.title === entry.title && (e._date === entryDate));
      if (target) {
        target.aiAnalysis = result;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        autoSyncAfterAnalysis();
      }
    } catch(se) { console.error('保存AI结果失败:', se); }
  }

  // 显示结果
  loadingEl.style.display = 'none';
  contentEl.style.display = 'block';
  contentEl.textContent = result;
  if (toggleBtn) toggleBtn.textContent = isAnalysisSuccess(result) ? '收起' : '⚠️ 分析失败，点击重试';
}

function cacheSet(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ ...data, cachedAt: Date.now() }));
}

function isCacheValid(cache) {
  if (!cache || !cache.cachedAt) return false;
  const t = new Date(cache.cachedAt);
  const now = new Date();
  const todayFetch = new Date(now); todayFetch.setHours(FETCH_HOUR, 0, 0, 0);
  if (now >= todayFetch && t >= todayFetch) return true;
  if (now < todayFetch) {
    const y = new Date(todayFetch); y.setDate(y.getDate() - 1);
    if (t >= y) return true;
  }
  return false;
}

// "2026年01月19日" → 20260119（方便比较）
function dateToKey(s) {
  const m = String(s).match(/(\d{4})年(\d{2})月(\d{2})日/);
  return m ? parseInt(m[1] + m[2] + m[3], 10) : 0;
}

// ============================================================
//  Step 1: 解析 — 提取所有条目的标题、链接、发文日期
// ============================================================
function parseAllEntries(html) {
  const subIdx = html.indexOf('id="sub"');
  const body = subIdx >= 0 ? html.slice(subIdx) : html;

  // 提取全部 <tr>...</tr>
  const allTr = [];
  const trRe = /<tr[\s\S]*?<\/tr>/gi;
  let m;
  while ((m = trRe.exec(body)) !== null) allTr.push(m[0]);
  if (allTr.length === 0) return null;

  const entries = [];
  for (const tr of allTr) {
    const hrefM = tr.match(/<a\s[^>]*href=["']([^"']+)["'][^>]*>/i);
    if (!hrefM) continue;

    let href = hrefM[1].trim();
    if (href.startsWith('./')) href = BASE_URL + href.slice(2);
    else if (href.startsWith('/')) href = 'https://www.mof.gov.cn' + href;

    const strM = tr.match(/var\s+str\s*=\s*["']([^"']+)["']/i);
    const title = strM ? strM[1].trim() : '（标题获取失败）';

    const dateM = tr.match(/(\d{4}年\d{2}月\d{2}日)/);
    const pubDate = dateM ? dateM[1] : '';

    if (!pubDate) continue;
    entries.push({ title, href, pubDate });
  }
  return entries.length > 0 ? entries : null;
}

// ============================================================
//  Step 2: 筛选逻辑
//    ① 从全部条目中挑出标题含"财监法"的
//    ② 从这些条目里取日期最大的 → "日期A"
//    ③ 再从全部条目中找：日期==A 且 标题含"财监法" → 最终展示
// ============================================================
function filterByCaijianfa(entries) {
  if (!entries || entries.length === 0) return null;

  // ① 标题含"财监法"的条目
  const caijianfaEntries = entries.filter(e => e.title.includes('财监法'));
  if (caijianfaEntries.length === 0) return null;

  // ② 日期最大的"财监法"条目 → 日期A
  const ref = caijianfaEntries
    .map(e => ({ ...e, _key: dateToKey(e.pubDate) }))
    .sort((a, b) => b._key - a._key)[0];

  const dateA = ref.pubDate;

  // ③ 日期==A 且 标题含"财监法"
  const filtered = entries.filter(
    e => e.pubDate === dateA && e.title.includes('财监法')
  );

  return { ref, dateA, filtered };
}

async function fetchData(forceRefresh = true) {
  // 直接使用嵌入的数据
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  renderLoading();

  try {
    const data = EMBEDDED_DATA;
    if (!data || !data.filtered || data.filtered.length === 0) {
      throw new Error('数据为空');
    }

    const { ref, dateA, filtered } = data;
    const cachedAt = Date.now();

    // ★ 从localStorage恢复AI分析缓存，合并到当前数据
    const enriched = filtered.map(entry => {
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"snapshots":[],"allEntries":[]}');
      const cached = history.allEntries.find(e => e.title === entry.title && e._date === entry.pubDate);
      return cached && cached.aiAnalysis ? { ...entry, aiAnalysis: cached.aiAnalysis } : entry;
    });

    // ★★★ 智能同步到B网页：只同步新条目，不重复同步旧条目 ★★★
    try {
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"snapshots":[],"allEntries":[]}');
      
      // 统计新条目数量
      let newCount = 0;
      for (const e of enriched) {
        const key = e.title + '|' + e.pubDate;
        const exists = history.allEntries.some(entry => entry.title + '|' + entry._date === key);
        if (!exists) newCount++;
      }
      
      // 显示同步状态
      const syncEl = document.getElementById('syncStatus');
      const syncMsg = document.getElementById('syncMsg');
      if (syncEl && syncMsg) {
        syncEl.classList.add('show');
        if (newCount > 0) {
          syncMsg.textContent = `🔄 发现 ${newCount} 个新条目，已同步到B网页`;
          syncEl.style.background = '#e8f5e9';
          syncEl.style.color = '#2e7d32';
        } else {
          syncMsg.textContent = `✓ 无新条目，无需同步（官网暂无更新）`;
          syncEl.style.background = '#f5f5f5';
          syncEl.style.color = '#666';
        }
        // 3秒后隐藏
        setTimeout(() => { if (syncEl) syncEl.classList.remove('show'); }, 3000);
      }
      
      // 只有有新条目时才同步
      if (newCount > 0) {
        // 合并条目：只添加新条目，保留旧条目（含AI分析结果）
        for (const e of enriched) {
          const key = e.title + '|' + e.pubDate;
          const existingIdx = history.allEntries.findIndex(entry => entry.title + '|' + entry._date === key);
          const newEntry = { ...e, _date: dateA };
          
          if (existingIdx >= 0) {
            // 条目已存在：保留旧条目的AI分析结果
            const oldAiAnalysis = history.allEntries[existingIdx].aiAnalysis;
            if (oldAiAnalysis && !newEntry.aiAnalysis) {
              newEntry.aiAnalysis = oldAiAnalysis;
            }
            history.allEntries[existingIdx] = newEntry;
          } else {
            history.allEntries.push(newEntry);
          }
        }
        
        // 更新快照
        const existIdx = history.snapshots.findIndex(s => s.dateA === dateA);
        const snapshot = { dateA, savedAt: Date.now(), count: enriched.length };
        if (existIdx >= 0) history.snapshots[existIdx] = snapshot;
        else history.snapshots.push(snapshot);
        history.snapshots.sort((a, b) => b.savedAt - a.savedAt);
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        console.log(`[同步] 发现 ${newCount} 个新条目，已同步到B网页`);
      } else {
        console.log(`[同步] 无新条目，无需同步（官网可能未更新）`);
      }
    } catch (se) { console.error('同步失败:', se); }

    // 使用带AI缓存的数据渲染
    renderInfoBar(dateA, enriched.length, cachedAt);
    renderRefEntry(ref);
    renderEntries(enriched);
    if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
  } catch (e) {
    if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
    renderError(e.message || '数据加载失败');
  }
}

// ============================================================
//  倒计时 & 定时刷新
// ============================================================
function updateCountdown() {
  const now = new Date();
  const next = new Date(now); next.setHours(FETCH_HOUR, 0, 0, 0);
  if (now >= next) next.setDate(next.getDate() + 1);
  const diff = next - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function scheduleNextRefresh() {
  const now = new Date();
  const next = new Date(now); next.setHours(FETCH_HOUR, 0, 0, 0);
  if (now >= next) next.setDate(next.getDate() + 1);
  const delay = next - now;
  console.log(`[财政部监控] 下次刷新: ${next.toLocaleString('zh-CN')}（${Math.round(delay/60000)}分钟后）`);
  setTimeout(() => { fetchData(true); scheduleNextRefresh(); }, delay);
}

setInterval(updateCountdown, 1000);
