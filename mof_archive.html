  // 回退到 localStorage（本地开发用）
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function saveToStorage(newData) {
  // newData: { dateA, filtered, savedAt }
  try {
    const history = loadHistory() || { snapshots: [], allEntries: [] };
    
    // 按URL去重：确保每条处罚决定书的URL唯一
    const existingUrls = new Set(history.allEntries.map(e => e.href));
    const newEntries = newData.filtered.filter(e => !existingUrls.has(e.href));
    
    const existingIdx = history.snapshots.findIndex(s => s.dateA === newData.dateA);
    const snapshot = {
      dateA: newData.dateA,
      savedAt: Date.now(),
      count: newEntries.length
    };
    
    if (existingIdx >= 0) {
      history.snapshots[existingIdx] = snapshot;
    } else {
      history.snapshots.push(snapshot);
    }
    
    // 添加新条目（带日期标记）
    history.allEntries.push(...newEntries.map(e => ({...e, _date: newData.dateA})));
    
    // 按savedAt倒序
    history.snapshots.sort((a,b) => b.savedAt - a.savedAt);
    
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch(e) { console.error('保存失败:', e); }
}

// 从AI分析文本中解析涉及准则和违规点
function parseAIAnalysis(text) {
  if (!text) return { standards: '', violations: '' };

  // 涉及准则：只提取《》中的内容，用顿号连接
  const stdMatches = [...text.matchAll(/《[^》]+》/g)];
  const standardsClean = stdMatches.map(m => m[0]).join('、');

  // 违规点：以【违规点】为界，取其后的内容
  const vioIdx = text.search(/【?违规点】?/i);
  let violationsRaw = vioIdx >= 0 ? text.slice(vioIdx).replace(/【?违规点】?[:：]?\s*/i, '').trim() : text;
  violationsRaw = violationsRaw.replace(/\n涉及准则[：:].*$/, '').trim();

  // 清理列表前缀并重新编号
  const violationLines = violationsRaw
    .split('\n')
    .map(l => l.replace(/^[\s\-*\d.、]+/, '').trim())
    .filter(l => l.length > 5);

  const numberedViolations = violationLines
    .map((l, i) => `${i + 1}、${l}`)
    .join('\n');

  return {
    standards: standardsClean,
    violations: numberedViolations || violationsRaw
  };
}

// 单元格展开/收起（展开时只显示全文，收起时只显示缩略）
function toggleCell(id) {
  const textEl = document.getElementById(id);
  const detailEl = document.getElementById(id + '-detail');
  const btnEl = document.getElementById(id + '-btn');
  if (!textEl && !detailEl) return;
  const isExpanded = detailEl && detailEl.classList.contains('show');
  if (isExpanded) {
    // 收起：显示缩略，隐藏全文
    if (detailEl) detailEl.classList.remove('show');
    if (textEl) { textEl.style.display = ''; textEl.classList.remove('expanded'); }
    if (btnEl) {
      const textLen = detailEl ? detailEl.textContent.length : 0;
      const isStdCol = id.startsWith('std-');
      btnEl.textContent = (textLen > 60 || (isStdCol && textLen > 0)) ? '展开' : '';
    }
  } else {
    // 展开：隐藏缩略，显示全文
    if (textEl) textEl.style.display = 'none';
    if (detailEl) { detailEl.classList.add('show'); }
    if (btnEl) btnEl.textContent = '收起';
  }
}

// 文字截断
function truncateText(text, maxLen) {
  if (!text) return '';
  return text.length > maxLen ? text.substring(0, maxLen) + '…' : text;
}

// ============================================================
//  AI分析
// ============================================================
async function analyzeViolation(issues, title) {
  const prompt = `# 角色
你是一个专业的资产评估违规分析助手。

# 任务
根据以下财政部行政处罚决定书的"检查发现的主要问题"内容，提取涉及准则和违规点。

政策标题：${title}

检查发现的主要问题：
${issues}

# 约束
- 必须基于最新的官方会计准则进行分析
- 输出必须简练，每个违规点只用一句话概括
- 违规点描述必须通用化，不要包含具体公司名称、具体金额、年份等案例细节
- 只输出涉及准则和违规点，不需要操作描述和合规要求
- 不得编造会计准则内容
- 如有，有几点就写几点

# 参考格式
**【涉及准则】**：《企业会计准则第X号——XX》
**【违规点】**：
- 期末可抵扣亏损不满足递延所得税资产的确认条件，导致多计递延所得税资产
- 客户已存在财务状况恶化、偿债能力不足的事实，应收坏账纳入账龄组合依据不充分`;

  try {
    const response = await fetch(COZE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: prompt })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullAnswer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      fullAnswer += decoder.decode(value, { stream: true });
    }
    return fullAnswer.trim() || '分析失败';
  } catch (error) {
    return '网络错误，请稍后重试';
  }
}

// 检查分析结果是否成功（不是错误提示）
function isAnalysisSuccess(result) {
  if (!result) return false;
  const errorKeywords = ['网络错误', '请稍后重试', '分析失败', '服务器错误', '请求超时'];
  return !errorKeywords.some(keyword => result.includes(keyword));
}

async function analyzeHistory(idx, entryIndex, date) {
  const history = loadHistory();
  if (!history) return;
  const entries = history.allEntries.filter(e => (e._date || e.pubDate) === date);
  const entry = entries[entryIndex];
  if (!entry) return;

  const stdId = 'std-' + idx;
  const vioId = 'vio-' + idx;
  const vioTd = document.getElementById('row-' + idx);
  if (!vioTd) return;

  // 如果已有成功的缓存，切换展开/收起
  if (entry.aiAnalysis && isAnalysisSuccess(entry.aiAnalysis)) {
    toggleCell(stdId);
    toggleCell(vioId);
    return;
  }

  // 找到分析按钮并显示"分析中"状态
  const btnSelector = vioTd.querySelector('.btn-analyze');
  if (btnSelector) {
    btnSelector.innerHTML = '<span class="spin">↻</span> 分析中...';
    btnSelector.disabled = true;
  }

  // 显示loading
  const stdDetailEl = document.getElementById(stdId + '-detail');
  const stdBtnEl = document.getElementById(stdId + '-btn');
  const vioDetailEl = document.getElementById(vioId + '-detail');
  const vioBtnEl = document.getElementById(vioId + '-btn');
  const stdTextEl = document.getElementById(stdId);
  const vioTextEl = document.getElementById(vioId);

  if (stdTextEl) stdTextEl.style.display = 'none';
  if (vioTextEl) vioTextEl.style.display = 'none';
  if (stdDetailEl) { stdDetailEl.textContent = '🤔 AI分析中...'; stdDetailEl.classList.add('show'); }
  if (vioDetailEl) { vioDetailEl.textContent = '🤔 AI分析中...'; vioDetailEl.classList.add('show'); }
  if (stdBtnEl) stdBtnEl.style.display = 'none';
  if (vioBtnEl) vioBtnEl.style.display = 'none';

  const result = await analyzeViolation(entry.issues || '', entry.title || '');
  
  // 只有分析成功才保存到localStorage
  if (isAnalysisSuccess(result)) {
    entry.aiAnalysis = result;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  const newParsed = parseAIAnalysis(result);

  // 填充内容（展开状态：只显示全文）
  if (stdDetailEl) stdDetailEl.textContent = newParsed.standards;
  if (vioDetailEl) vioDetailEl.textContent = newParsed.violations;
  
  // 如果分析失败，显示重试按钮在违规点列
  if (!isAnalysisSuccess(result)) {
    // 隐藏loading，显示错误信息和重试按钮
    const vioCell = vioTd.querySelector('.td-violations');
    if (vioCell) {
      vioCell.innerHTML = `<div style="font-size:11px;color:#e74c3c;text-align:center;padding:8px 0;">
        <div style="margin-bottom:6px;">⚠️ ${escHtml(result)}</div>
        <button class="btn-goto" style="background:#e74c3c;font-size:10px;padding:4px 12px;border:none;border-radius:4px;color:#fff;cursor:pointer;" onclick="analyzeHistory('${escHtml(idx)}', ${entryIndex}, '${escHtml(date)}')">重新分析</button>
      </div>`;
    }
  } else {
    if (stdBtnEl) {
      stdBtnEl.style.display = 'inline-block';
      stdBtnEl.textContent = '收起';
      stdBtnEl.onclick = function() { toggleCell(stdId); };
    }
    if (vioBtnEl) {
      vioBtnEl.style.display = 'inline-block';
      vioBtnEl.textContent = '收起';
      vioBtnEl.onclick = function() { toggleCell(vioId); };
    }
    vioTd.classList.add('cell-ai');
  }
}

// ============================================================
function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  const field = document.getElementById('searchField').value;
  const resultCountEl = document.getElementById('searchResultCount');
  
  window.__searchState = { keyword, field };
  
  if (!keyword) {
    clearSearch();
    return;
  }
  
  // 获取所有数据
  const history = loadHistory();
  if (!history || !history.allEntries) {
    resultCountEl.style.display = 'none';
    return;
  }
  
  const allEntries = history.allEntries;
  const matchedEntries = [];
  const keywordLower = keyword.toLowerCase();
  
  for (const entry of allEntries) {
    let matched = false;
    
    // 解析AI分析结果（用于搜索涉及准则和违规点）
    const parsed = parseAIAnalysis(entry.aiAnalysis || '');
    
    if (field === 'all' || field === 'companies') {
      if ((entry.companies || '').toLowerCase().includes(keywordLower)) {
        matched = true;
      }
    }
    
    if (!matched && (field === 'all' || field === 'issues')) {
      if ((entry.issues || '').toLowerCase().includes(keywordLower)) {
        matched = true;
      }
    }
    
    if (!matched && (field === 'all' || field === 'standards')) {
      if (parsed.standards.toLowerCase().includes(keywordLower)) {
        matched = true;
      }
    }
    
    if (!matched && (field === 'all' || field === 'violations')) {
      if (parsed.violations.toLowerCase().includes(keywordLower)) {
        matched = true;
      }
    }
    
    if (matched) {
      matchedEntries.push(entry);
    }
  }
  
  // 显示搜索结果
  renderSearchResults(matchedEntries, keyword);
  
  // 更新结果计数
  if (resultCountEl) {
    resultCountEl.style.display = 'inline-block';
    resultCountEl.className = matchedEntries.length > 0 ? 'search-result-count has-result' : 'search-result-count';
    resultCountEl.textContent = `找到 ${matchedEntries.length} 条记录`;
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  window.__searchState = { keyword: '', field: 'all' };
  const resultCountEl = document.getElementById('searchResultCount');
  if (resultCountEl) {
    resultCountEl.style.display = 'none';
    resultCountEl.textContent = '';
  }
  // 重新渲染所有数据
  renderAllHistory();
}

      </div>`;
    return;
  }
  
  // 按日期分组
  const byDate = {};
  for (const e of entries) {
    const d = e._date || e.pubDate || '未知日期';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  }
  
  let html = `
    <div class="info-card">
      <div class="info-left">
        <span class="date-chip">📦 历史快照</span>
        <span class="info-count">搜索结果：<strong>${entries.length}</strong> 条记录</span>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-label">🔍 搜索：</span>
      <input type="text" id="searchInput" class="search-input" placeholder="输入关键词模糊搜索..." value="${escHtml(keyword)}">
      <select id="searchField" class="search-input" style="width:auto;min-width:120px;">
        <option value="all">全部字段</option>
        <option value="companies">当事人</option>
        <option value="issues">检查发现的问题</option>
        <option value="standards">涉及准则</option>
        <option value="violations">违规点</option>
      </select>
      <button class="search-btn" onclick="doSearch()">搜索</button>
      <button class="clear-search" onclick="clearSearch()">清除</button>
      <span id="searchResultCount" class="search-result-count has-result">找到 ${entries.length} 条记录</span>
    </div>`;
  
  // 按日期倒序
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
  for (const date of dates) {
    const dateEntries = byDate[date];
    
    html += `
    <div class="date-group-header">
      <span class="date-chip-table">${escHtml(date)}</span>
      <span class="date-group-meta">${dateEntries.length} 条记录</span>
    </div>
    <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th class="td-seq">#</th>
          <th>处罚决定</th>
          <th class="td-companies">当事人</th>
          <th class="td-penalty">处罚措施</th>
          <th class="td-issues">检查发现的问题</th>
          <th class="td-standards">涉及准则</th>
          <th class="td-violations">违规点</th>
        </tr>
      </thead>
      <tbody>`;
    
    for (let i = 0; i < dateEntries.length; i++) {
      const e = dateEntries[i];
      const idx = `search_${date}_${i}`;
      html += renderTableRow(e, idx, i, date);
    }
    
    html += `</tbody></table></div>`;
  }
  
  main.innerHTML = html;
  
  // 重新初始化列宽拖动
  initColumnResize();
}

// ============================================================
//  导出历史数据
// ============================================================
function exportHistory() {
  const history = loadHistory();
  if (!history || !history.allEntries || history.allEntries.length === 0) {
    alert('暂无数据可导出');
    return;
  }
  const excelData = history.allEntries.map(e => {
    const parsed = parseAIAnalysis(e.aiAnalysis || '');
    return {
      '归档日期': e._date || '',
      '政策发布时间': e.pubDate || '',
      '政策名称': e.title || '',
      '当事人': e.companies || '',
      '行政处罚': e.penalty || '',
      '检查发现的主要问题': e.issues || '',
      '涉及准则': parsed.standards,
      '违规点': parsed.violations
    };
  });
  const ws = XLSX.utils.json_to_sheet(excelData);
  ws['!cols'] = [
    { wch: 16 }, { wch: 16 }, { wch: 50 },
    { wch: 40 }, { wch: 40 }, { wch: 60 }, { wch: 50 }, { wch: 60 }
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '历史归档');
  const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `财监法历史归档_${dateStr}.xlsx`);
}

// ============================================================
//  初始化
// ============================================================
function init() {
  renderHistoryOverview();
  renderAllHistory();
  initColumnResize();
}

// 等待 DOM 加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
  init();
  
  // 搜索框回车搜索
  document.getElementById('main').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.id === 'searchInput') {
      doSearch();
    }
  });
});

// 列宽拖动功能
function initColumnResize() {
  // 移除已有的拖动把手，避免重复
  document.querySelectorAll('.resize-handle').forEach(h => h.remove());
  
  const tables = document.querySelectorAll('.data-table');
  tables.forEach(table => {
    const headers = table.querySelectorAll('thead th');
    let startX, startWidth, resizingTh;

    headers.forEach((th, index) => {
      // 最后一列不添加拖动把手
      if (index === headers.length - 1) return;
      
      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      th.appendChild(handle);

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizingTh = th;
        startX = e.pageX;
        startWidth = th.offsetWidth;
        handle.classList.add('active');
        th.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
    });

    document.addEventListener('mousemove', (e) => {
      if (!resizingTh) return;
      const diff = e.pageX - startX;
      const newWidth = Math.max(40, startWidth + diff); // 最小宽度40px
      resizingTh.style.width = newWidth + 'px';
      resizingTh.style.minWidth = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (resizingTh) {
        const handle = resizingTh.querySelector('.resize-handle');
        if (handle) handle.classList.remove('active');
        resizingTh.classList.remove('resizing');
        resizingTh = null;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });
  });
}

// 一次性清理脚本：只保留序号13-16号和89-100号（共16条）
(function oneTimeClean() {
  if (oneTimeClean.done) return;
  oneTimeClean.done = true;
  
  try {
    const KEY = 'mof_history_v1';
    const history = JSON.parse(localStorage.getItem(KEY));
    if (!history || !history.allEntries) return;
    
    const total = history.allEntries.length;
    if (total < 100) {
      console.log('数据不足100条，跳过清理。当前:', total);
      return;
    }
    
    // 保留的索引: 12-15 (13-16号) 和 88-99 (89-100号)
    const keepIndices = [12,13,14,15, 88,89,90,91,92,93,94,95,96,97,98,99];
    
    const before = history.allEntries.length;
    history.allEntries = history.allEntries.filter((_, idx) => keepIndices.includes(idx));
    history.snapshots = [];
    
    localStorage.setItem(KEY, JSON.stringify(history));
    console.log(`清理完成: ${before}条 -> ${history.allEntries.length}条`);
    location.reload(); // 刷新页面显示结果
  } catch(e) { console.error('清理失败:', e); }
})();
</script>
