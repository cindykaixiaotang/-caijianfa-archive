<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>财政部 · 行政处罚决定书（历史归档）</title>
  <style>
    :root {
      --blue: #2980b9;
      --blue-dark: #1a5276;
      --blue-light: #d6eaf8;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #2c3e50;
      --sub: #7f8c8d;
      --border: #eaecf0;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --red: #c0392b;
      --red-light: #fadbd8;
      --red-dark: #96281b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      color: #fff;
      padding: 28px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 3px 10px rgba(41,128,185,0.35);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.18);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .header-sub { font-size: 13px; opacity: 0.82; margin-top: 3px; }
    .header-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }

    main { max-width: 1600px; margin: 36px auto; padding: 0 24px; }

    .info-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border: 1px solid var(--border);
      padding: 18px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .info-left { display: flex; align-items: center; gap: 14px; }
    .date-chip {
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 20px;
    }
    .info-count { font-size: 14px; color: var(--text); }
    .info-count strong { color: var(--blue); font-size: 18px; }

    /* ========== 搜索栏 ========== */
    .search-bar {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border: 1px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .search-input {
      flex: 1;
      min-width: 120px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(41,128,185,0.15);
    }
    .search-input::placeholder { color: #b0bec5; }
    .search-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .search-btn:hover { background: var(--blue-dark); }
    .search-btn:disabled { background: #b0bec5; cursor: not-allowed; }
    .search-result-count {
      font-size: 12px;
      color: var(--sub);
      padding: 4px 10px;
      background: var(--blue-light);
      border-radius: 12px;
    }
    .search-result-count.has-result {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .clear-search {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .clear-search:hover { background: #eee; }
    .highlight {
      background: #fff3cd;
      padding: 1px 3px;
      border-radius: 3px;
    }

    .entry-list { display: flex; flex-direction: column; gap: 12px; }

    /* ========== 表格视图 ========== */
    .table-wrap {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-bottom: 16px;
      position: relative;
    }
    .data-table {
      width: 100%;
      min-width: 1300px;
      border-collapse: collapse;
      font-size: 14px;
      table-layout: fixed; /* 固定表格布局，支持列宽拖动 */
    }
    .data-table thead tr {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      color: #fff;
    }
    .data-table thead th {
      padding: 11px 14px;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      white-space: normal; /* 允许换行 */
      border-right: 1px solid rgba(255,255,255,0.15);
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }
    /* 列拖动分隔条 */
    .resize-handle {
      position: absolute;
      right: -2px;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      background: linear-gradient(to right, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      z-index: 10;
      transition: background 0.2s;
    }
    .resize-handle:hover,
    .resize-handle.active {
      background: linear-gradient(to right, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
    }
    /* 表头拖动时的高亮 */
    .data-table thead th.resizing {
      background: rgba(255,255,255,0.25);
    }
    .data-table thead th:first-child { border-radius: 12px 0 0 0; }
    .data-table thead th:last-child { border-right: none; border-radius: 0 12px 0 0; }
    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:nth-child(even) { background: #f8fafc; }
    .data-table tbody tr:hover { background: #e8f4fb; }
    .data-table td {
      padding: 10px 13px;
      vertical-align: top;
      color: var(--text);
      line-height: 1.6;
    }
    .data-table tbody tr:last-child td:first-child { border-radius: 0 0 0 12px; }
    .data-table tbody tr:last-child td:last-child { border-radius: 0 0 12px 0; }
    .td-seq { width: 40px; min-width: 40px; text-align: center; color: #b0bec5; font-size: 12px; }
    .td-title { min-width: 120px; }
    .td-title a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal; /* 允许换行 */
      word-wrap: break-word;
      line-height: 1.4;
    }
    .td-title a:hover { text-decoration: underline; color: var(--blue-dark); }
    .td-title .td-title-sub {
      font-size: 11px;
      color: #90a4ae;
      font-weight: 400;
      margin-top: 1px;
      display: block;
    }
    .td-companies { min-width: 80px; font-size: 12px; line-height: 1.6; word-wrap: break-word; overflow-wrap: break-word; }
    .td-companies { color: #c0392b; } /* 数据单元格红色 */
    .data-table thead .td-companies { color: #fff; } /* 表头白色 */
    .td-penalty { min-width: 80px; font-size: 12px; }
    .td-issues { min-width: 100px; }
    .td-standards { min-width: 100px; }
    .td-violations { min-width: 150px; }

    /* 涉及准则 / 违规点 / 检查问题：默认最多3行 */
    .cell-text {
      font-size: 12px;
      line-height: 1.7;
      color: #546e7a;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      word-break: break-word;
    }
    /* 展开后移除行数限制 */
    .cell-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }
    .cell-expand-btn {
      font-size: 11px;
      color: var(--blue);
      cursor: pointer;
      user-select: none;
      margin-top: 3px;
      display: inline-block;
      font-weight: 600;
    }
    .cell-expand-btn:hover { text-decoration: underline; }

    /* 违规分析单元格特殊样式 */
    .cell-ai {
      background: linear-gradient(135deg, #fffbf5 0%, #fef3e2 100%);
      border-radius: 6px;
      padding: 8px 10px !important;
      border: 1px solid #f0d9a8;
    }
    .cell-ai .cell-text { color: #8d5e00; font-size: 12px; line-height: 1.8; }
    .cell-ai .cell-expand-btn { color: #e17055; }

    .ai-done {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8f5e9; color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px; font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(46,125,50,0.1);
    }
    .ai-done svg { flex-shrink: 0; }

    .cell-loading {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 6px;
    }

    .violation-loading {
      font-size: 12px;
      color: #e17055;
      text-align: center;
      padding: 4px;
    }

    /* 展开详情区 */
    .expand-detail {
      background: #fffef8;
      border: 1px solid #f0d9a8;
      border-radius: 6px;
      padding: 8px 12px;
      margin-top: 5px;
      font-size: 11px;
      color: #444;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .expand-detail.show { display: block; }
    .expand-detail::before {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(to right, #f0d9a8, transparent);
      margin-bottom: 6px;
    }

    /* 表格内日期分组标题 */
    .date-group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    .date-group-header:first-child { margin-top: 0; }
    .date-chip-table {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(41,128,185,0.3);
    }
    .date-group-meta {
      font-size: 12px;
      color: #78909c;
      font-weight: 500;
    }

    /* 旧样式保留（兼容） */
    .entry-card { display: none; }

    .empty-block {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
    }
    .empty-block .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-block h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-block p { font-size: 14px; }
    .empty-block .tip {
      margin-top: 16px; background: var(--blue-light);
      color: var(--blue-dark); border-radius: 10px;
      padding: 14px 20px; font-size: 13px;
      display: inline-block; text-align: left; line-height: 1.6;
    }

    footer {
      text-align: center;
      color: var(--sub);
      font-size: 12px;
      padding: 30px 0 20px;
    }
    footer a { color: var(--blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* 骨架屏 */
    @keyframes shimmer { to { background-position: -200% 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    .sk-card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .sk-circle { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
    .sk-body { flex: 1; }
    .sk-line { height: 14px; margin-bottom: 8px; }
    .sk-line.short { width: 40%; }

    /* ========== 分页控件 ========== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin: 20px 0 10px;
      flex-wrap: wrap;
    }
    .page-info {
      font-size: 13px;
      color: #7f8c8d;
      margin-right: 12px;
      white-space: nowrap;
    }
    .page-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      min-width: 36px;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue-dark);
    }
    .page-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-weight: 700;
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    /* ========== 同步设置弹窗 ========== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 9999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: #fff; border-radius: 16px;
      padding: 32px; max-width: 520px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-card h3 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
    .modal-card p { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
    .modal-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .modal-card input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: monospace;
      margin-bottom: 16px; box-sizing: border-box;
    }
    .modal-card input:focus { outline: none; border-color: var(--red); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-primary {
      background: var(--red); color: #fff; border: none;
      padding: 9px 22px; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-ghost {
      background: transparent; color: var(--sub); border: 1px solid var(--border);
      padding: 9px 18px; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .modal-status { font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
    .modal-status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .modal-status.error { display: block; background: #ffebee; color: var(--red); }
    .modal-status.info { display: block; background: #fff8e1; color: #5d4037; }
    .hint-box {
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 8px; padding: 12px 14px; font-size: 12px;
      color: #5d4037; margin-bottom: 18px; line-height: 1.6;
    }
    .hint-box a { color: var(--red); }

    /* ========== 同步按钮 ========== */
    .sync-btn {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      color: #fff;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.2s;
    }
    .sync-btn:hover { background: rgba(255,255,255,0.32); }
    .sync-btn.synced { background: rgba(46,204,113,0.35); border-color: rgba(46,204,113,0.6); }
    .sync-btn.error { background: rgba(231,76,60,0.35); border-color: rgba(231,76,60,0.6); }

  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">📦</div>
    <div>
      <div class="header-title">财政部 · 行政处罚决定书</div>
      <div class="header-sub">历史归档 · 数据持续累积</div>
    </div>
  </div>
  <div class="header-badge">
    <span>📊</span>
    <span id="totalCount">—</span>
    <button class="sync-btn" id="syncBtn" title="AI 分析同步设置" onclick="openSyncModal()">
      <span id="syncBtnIcon">☁️</span>
      <span id="syncBtnText">同步设置</span>
    </button>
  </div>
</header>

<!-- 同步设置弹窗 -->
<div class="modal-overlay" id="syncModal">
  <div class="modal-card">
    <h3>☁️ AI 分析同步到 GitHub</h3>
    <p>将你的 AI 分析结果直接推送至 GitHub 仓库，下一次 GitHub Actions 运行时自动合并到归档页面。</p>
    <div class="hint-box">
      <strong>注意：</strong>Token 需要有 <code>repo</code> 权限（不是 Gist）。<br/>
      若尚未创建：<a href="https://github.com/settings/tokens" target="_blank">去创建 Token</a>，
      勾选 <code>repo</code>。
    </div>
    <label>GitHub Token（PAT，需有 repo 权限）</label>
    <input type="password" id="gistToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeSyncModal()">取消</button>
      <button class="btn-primary" onclick="saveAndSync()">保存并同步</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<main id="main">
  <!-- 内容由JS渲染 -->
</main>

<footer>
  数据来源：<a href="https://www.mof.gov.cn/gp/xxgkml/jdjcj/" target="_blank">财政部监督评价局</a>
  · 由 AI 自动归档
</footer>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

业编制其预算时参考定额为《铁路工程预算定额（2010）》，截至评估基准日，最新定额为《铁路工程预算定额（2017）》，本次评估通过对其开工之日至评估基准日定额的基价涨幅，采用造价指数调整法评估。本次摘录了15项工程对2010年的定额与2017年的定额进行对比，通过定额比较，基价平均涨幅约10%，故本次评估以企业实际发生的工程费再乘以工程造价增长率确认其评估值」。经检查，上述15项工程所包含的分项工程定额基价增长率差异较大，最大增长32.14%、最小增长-27.6%，以这15项工程所包含的分项工程定额基价增长率的算术平均值作为工程造价增长率的做法不合理。 二是在建工程主要包括路基工程、桥涵及隧道工程，你公司资产评估专业人员仅按照路基工程定额基价，未选择桥涵工程定额和隧道工程定额的相关定额基价。同时，根据《铁路工程预算定额（2010）》和《铁路工程预算定额（2017）》，路基工程定额分别包含521项工程内容和497项工程内容。你公司资产评估专业人员仅采用其中15项内容作为定额基价增长率测算基础，未说明理由。 三是未考虑2017年至评估基准日（2023年12月31日）工程造价的变动情况。 四是你公司资产评估专业人员未分析土地征用及迁移补偿标准的变化，直接采用2015年在建工程—土地征用及迁移补偿费账面值123,109,747.28元作为评估值。 五是你公司资产评估专业人员直接采用账面发生的待摊投资剔除赔偿费用后的账面余额82,404,436.44元作为评估值，未分析评估基准日的取费基数和计费标准。 （二）你公司出具的蓉域评报字(2024)第005号资产评估报告（以下称第005号报告）存在以下问题： 1.评定估算形成结论不恰当。 2007年5月17日特许经营权授予方某市政公用局与特许经营权受让方某然气有限公司签订《城市管道燃气特许经营合同》。该合同约定，特许经营权有效期至2037年5月17日，特许经营权终止后，某然气有限公司应当将全部现有的，以及正在建设的燃气管网设施移交给某市政公用局。 你公司资产评估专业人员在测算资产组预计未来现金流量的现值时，错误地把永续期作为收益期，未考虑特许经营合同的有效期限。该错误导致评估差异7,500.00万元（在其他条件不变的情况下，造成高估），差异率22.46%，商誉所在资产组由减值变为不减值。 2.重要评估资料缺失。 资产评估档案中无特许经营合同、管道设计供气量等影响评估结论的重要资料。","index":"8","aiAnalysis":"**【涉及准则】**：《资产评估执业准则——不动产》、《资产评估执业准则——无形资产》、《资产评估操作规范意见（试行）》\n**【违规点】**：\n1、未结合在建工程长期停工的实际情况，分析停工经济原因、复工可能性及相关费用等影响资产贬值的因素\n2、采用差异较大的分项工程定额基价增长率算术平均值作为工程造价增长率，做法不合理\n3、未全面选取在建工程各类工程的定额基价，仅以少量工程内容作为定额基价增长率测算基础且未说明理由\n4、未考虑最新定额发布至评估基准日期间的工程造价变动情况\n5、未分析土地征用及迁移补偿标准变化，直接采用历史账面值作为评估值\n6、未分析评估基准日取费基数和计费标准，直接采用账面待摊投资余额作为评估值\n7、测算特许经营权对应资产组未来现金流量现值时，错误将永续期作为收益期，未考虑特许经营合同有效期限\n8、未归档影响评估结论的特许经营合同、业务核心参数等重要评估资料"},{"title":"财政部行政处罚决定书（财监法〔2026〕7号）","href":"https://www.mof.gov.cn/gp/xxgkml/jdjcj/202603/t20260316_3985402.htm","pubDate":"2026年03月03日","companies":"张坤明","penalty":"警告","issues":"广东千福田出具的粤千福田资评报字〔2024〕0919B001号资产评估报告存在以下问题： 1.采用市场法评估时选取的评估案例不可比。 被评估单位主营业务为私募股权投资，评估基准日交易性金融资产（股权投资）占资产总额比例约99%。采用市场法（价值比率为市净率）评估时，选取的可比公司为中金公司（SH.601995）、第一创业（SZ.002797）、首创证券（SH.601136）。根据3家可比公司2024年中报披露：中金公司私募股权业务占比为3.6%，股权投资占总资产比例未披露;第一创业私募股权业务占比未披露，股权投资占总资产比例为1.49%;首创证券私募股权业务占比未披露，股权投资占总资产比例为0.68%。资产评估专业人员选取的三家可比公司与被评估单位的业务类型差异大，均不具有可比性。 2.仅采用市场法一种方法进行评估 益 8200 万元”。中宇泰诺资产评估公司根据以上收益预测，采用收益法评估上述 2 项实用新型专利市场价值共计 30,000,000 元。 广西大泽 基于上述评估结论，于 2023 年 9 月 13 日分别增加无形资产和实收资本 30,000,000 元，占 2023 年末无形资产账面原值、实收资本的 100% 。经查，截至检查日广西大泽未对上述 2 项实用新型专利进行具体生产安排，未产生相关收益，该公司出具的《关于进行资产评估有关事项的说明》中对未来收益的预测无明确证据支持，预测金额不合理，评估结论不应作为无形资产初始计量的基础， 2023 年末多计无形资产账面原值和实收资本 29,977,000 元。 祥浩所在对广西大泽 2023 年度财务报表审计中，仅检查了上述 ２ 项实用新型专利的产权证书、资产评估报告以及企业出资相关证明文件，未对用作审计证据的信息执行利用管理层的专家的审计程序，未评价管理层的专家的胜任能力、专业素质和客观性；未了解管理层的专家的工作；未评价将管理层的专家的工作用作相关认定的审计证据的适当性；该所对 ２ 项实用新型专利的评估结论明显不合理的异常情况未保持职业怀疑，未进一步设计实施审计程序以验证相关资产价值的合理性，未关注 ２ 位股东取得相关实用新型专利付出对价情况并与评估结论进行比对核实，未识别相关重大错报。 2. 根据广西大泽的收入确认政策及与项目单位双方确认的工程过程结算表，截至 2023 年末该公司累计应确认收入 184,774,946.99 元，账面实际确认收入 173,385,037.61 元，未及时确认收入 11,389,909.38 元，其中 2022 年 5,646,980.68 元、 2023 年 5,742,928.70 元。 祥浩所在对广西大泽 2023 年度财务报表审计中，审计档案仅见企业项目进度收入台账和成本台账、部分项目的收入合同及工程费用结算表等被审计企业的资料，该所对营业收入、营业成本等科目未实施必要的审计程序，未取得充分适当的审计证据，未识别相关重大错报。","_date":"2025年12月30日"},{"title":"财政部行政处罚决定书（财监法〔2025〕356号）","href":"https://www.mof.gov.cn/gp/xxgkml/jdjcj/202604/t20260428_3988697.htm","pubDate":"2025年12月30日","companies":"梁金健","penalty":"警告","issues":"未履行必要的审计程序，未获取充分适当的审计证据的情况下为广西大泽建设工程有限公司出具审计报告，且未识别企业财务报表存在的重大错报。 一、 未履行必要的审计程序，未获取充分适当的审计证据的情况下出具审计报告 （一） 广西大泽建设工程有限公司（以下称广西大泽） 2023 年度财务报表列示“管理费用本期金额 4,628,440.16 元、上期金额 3,831,990.04 元，营业外支出本期金额 829,116.09 元、上期金额 1,572,296.29 元，应交税费期末余额 943,478.89 元、期初余额 3,729,954.31 元”。祥浩所在对广西大泽 2023 年度财务报表审计中，未对上述科目执行审计程序。截至现场检查结束日，该所未提供上述科目的审计底稿。 （二） 广西大泽 2023 年度财务报表列示“应收账款期末余额 29,433,312.57 元、应付账款期末余额 29,616,858.47 元、预付款项期末余额 3,736,377.23 元、其他应收款期末余额 627,013.08 元”。祥浩所在对广西大泽 2023 年度财务报表审计中，对上述往来款项仅执行函证程序，未执行其他必要的审计程序。截至现场检查结束日，该所未提供上述科目除函证外的审计底稿。 （三） 祥浩所 2023 年 5 月出具广西大泽 2022 年度财务报表审计报告后，广西大泽在未与注册会计师进行沟通的情况下，暂估工程成本 29,970,000 元，调整 2022 年相关科目金额，并按照调整后的企业财务报表进行纳税申报。该所在对广西大泽 2023 年度财务报表审计中，审计底稿记录广西大泽 2023 年度期初重大会计差错更正 29,970,000 元，但未对该期初重大会计差错执行相关审计程序。 （四） 广西大泽截至 2023 年 12 月 31 日固定资产原值 1,284,391.30 元、累计折旧 466,155.89 元、净值 818,235.41 元；无形资产原值 30,000,000 元、累计摊销 1,263,297.88 元、净值 28,736,702.12 元。祥浩所在对广西大泽 2023 年度财务报表审计中，未对固定资产累 ttps://www.mof.gov.cn/gp/xxgkml/jdjcj/202604/t20260428_3988679.htm","pubDate":"2025年12月30日","companies":"邱凯","penalty":"警告","issues":"一、 未发现宁波市会展旅业有限公司（以下称宁波会展） 以 总额法代替净额法核算，多确认营业收入的重大会计差错 1. 宁波会展有关长龙航空、桂林航空机票包销业务中，宁波会展履行的不是机票的采购与销售职责，也未拥有机票定价权，对机票不具有控制权，在该业务中宁波会展为代理人，不属于主要责任人，应当按照净额法确认收入。宁波会展采用总额法确认上述业务收入，导致 2023 年度多计营业收入 4.49 亿元、营业成本 4.49 亿元。 浙江科信已获取相关协议，对部分长龙航空、桂林航空机票 包销业务收入进行了抽样测试，并且项目二审复核人对上述事项复核意见为“关注”，但未保持应有的职业怀疑，认可了企业的会计处理，未发现上述重大会计差错。 2. 宁波会展开展“东航汇”充值业务，只负责垫付资金及对充值账户的监管，在该业务中宁波会展为代理人，不属于主要责任人，应当按照净额法确认收入。宁波会展采用总额法确认上述业务收入，导致 2023 年度多计营业收入 4,443.40 万元、营业成本 4,443.40 万元。 浙江科信对上述明显超过重要性水平的业务，未执行审计程序，认可了企业的会计处理，未发现上述重大会计差错。 二、 未发现宁波会展 将 代收代付款确认营业收入 、营业成本 的重大会计差错 宁波会展将海丝之路项目和雪窦山项目代收代付款项确认为自身营业收入和营业成本，导致 2023 年度多计营业收入、营业成本 412.74 万元。 浙江科信已获取海丝之路项目相关合同等关键审计证据，应当知晓代收代付款不应确认营业收入和营业成本，但未保持应有的职业怀疑，认可了企业的会计处理。对雪窦山项目收入和成本未执行审计程序，未发现上述重大会计差错。","_date":"2025年12月30日"},{"title":"财政部行政处罚决定书（财监法〔2025〕348号）","href":"https://www.mof.gov.cn/gp/xxgkml/jdjcj/202604/t20260428_3988678.htm","pubDate":"2025年12月30日","companies":"董珊珊","penalty":"警告","issues":"一、 未发现宁波市会展旅业有限公司（以下称宁波会展） 以 总额法代替净额法核算，多确认营业收入的重大会计差错 1. 宁波会展有关长龙航空、桂林航空机票包销业务中，宁波会展履行的不是机票的采购与销售职责，也未拥有机票定价权，对机票不具有控制权，在该业务中宁波会展为代理人，不属于主要责任人，应当按照净额法确认收入。宁波会展采用总额法确认上述业务收入，导致 2023 年度多计营业收入 4.49 亿元、营业成本 4.49 亿元。 浙江科信已获取相关协议，对部分长龙航空、桂林航空机票 包销业务收入进行了抽样测试，并且项目二审复核人对上述事项复核意见为“关注”，但未保持应有的职业怀疑，认可了企业的会计处理，未发现上述重大会计差错。 2 . 宁波会展开展“东航汇”充值业务，只负责垫付资金及对充值账户的监管，在该业务中宁波会展为代理人，不属于主要责任人，应当按照净额法确认收入。宁波会展采用总额法确认上述业务收入，导致 2023 年度多计营业收入 4,443.40 万元、营业成本 4,443.40 万元。 浙江科信对上述明显超过重要性水平的业务，未执行审计程序，认可了企业的会计处理，未发现上述重大会 计差错。 二、 未发现宁波会展 将 代收代付款确认营业收入 、营业成本 的重大会计差错 宁波会展将海丝之路项目和雪窦山项目代收代付款项确认为自身营业收入和营业成本，导致 2023 年度多计营业收入、营业成本 412.74 万元。 浙江科信已获取海丝之路项目相关合同等关键审计证据， 应当知晓代收代付款不应确认营业收入和营业成本 ，但未保持应有的职业怀疑，认可了企业的会计处理。对雪窦山项目收入和成本未执行审计程序，未发现上述重大会计差错。","_date":"2025年12月30日"},{"title":"财政部行政处罚决定书（财监法〔2025〕347号）","href":"https://www.mof.gov.cn/gp/xxgkml/jdjcj/202604/t20260428_3988676.htm","pubDate":"2025年12月30日","companies":"吴悦","penalty":"","issues":"一、以总额法代替净额法核算包销机票业务收入，多计收 // ============================================================
//  GitHub 同步配置
// ============================================================
const PUSH_TOKEN_KEY = 'mof_push_token';
const REPO_OWNER     = 'cindykaixiaotang';
const REPO_NAME      = '-caijianfa-archive';
const SYNC_FILE      = 'ai_analyses.json';
const SYNC_BRANCH    = 'main';

async function pushToRepo(token) {
  const history = loadHistory();
  if (!history || !history.allEntries) return 0;
  const localEntries = history.allEntries.filter(e => e.aiAnalysis && isAnalysisSuccess(e.aiAnalysis));

  const apiBase = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME;
  const headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };

  // 1. 先从 GitHub 拉取已有分析记录（用于合并）
  let githubMap = new Map();
  let sha = null;
  try {
    const getResp = await fetch(`${apiBase}/contents/${SYNC_FILE}?ref=${SYNC_BRANCH}`, { headers });
    if (getResp.ok) {
      const data = await getResp.json();
      sha = data.sha;
      const content = JSON.parse(atob(data.content));
      if (content.entries) {
        content.entries.forEach(e => { githubMap.set(e.href, e); });
      }
    }
  } catch(e) {}

  // 2. 合并：GitHub 已有 + 本地新增（本地优先，覆盖同名 href）
  localEntries.forEach(e => { githubMap.set(e.href, { href: e.href, title: e.title, aiAnalysis: e.aiAnalysis }); });
  const merged = Array.from(githubMap.values());

  if (merged.length === 0) return 0;

  const content = JSON.stringify({
    updatedAt: new Date().toISOString(),
    entries: merged
  }, null, 2);

  const encoded = btoa(unescape(encodeURIComponent(content)));
  const payload = {
    message: '同步 AI 分析结果: ' + new Date().toLocaleString('zh-CN'),
    content: encoded,
    branch: SYNC_BRANCH
  };
  if (sha) payload.sha = sha;

  const resp = await fetch(`${apiBase}/contents/${SYNC_FILE}`, {
    method: 'PUT',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  // 遇到 409 冲突（SHA 过期，被 GitHub Actions 等其他进程抢先更新了）则重试一次
  if (resp.status === 409) {
    // 尝试从 409 响应体解析最新 SHA（GitHub 会返回最新 SHA 在 errors[].message 中）
    let freshSha = null;
    try {
      const errBody = await resp.json();
      // GitHub 返回结构: errors[0].message 包含 "latest SHA is <sha>"
      const shaMatch = errBody.message && errBody.message.match(/([a-f0-9]{40})/);
      if (shaMatch) freshSha = shaMatch[1];
    } catch(e) {}

    // 如果 409 响应体里没有 SHA，重新获取
    if (!freshSha) {
      try {
        const getResp2 = await fetch(`${apiBase}/contents/${SYNC_FILE}?ref=${SYNC_BRANCH}`, { headers });
        if (getResp2.ok) {
          const data2 = await getResp2.json();
          freshSha = data2.sha;
        }
      } catch(e) {}
    }

    if (!freshSha) throw new Error('409冲突但无法获取最新SHA，请稍后重试');

    payload.sha = freshSha;
    const resp2 = await fetch(`${apiBase}/contents/${SYNC_FILE}`, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp2.ok) {
      const err = await resp2.json().catch(() => ({}));
      throw new Error(err.message || 'HTTP ' + resp2.status);
    }
    return merged.length;
  }

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.message || 'HTTP ' + resp.status);
  }
  return merged.length;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
//  localStorage 操作（从A网页读取累积数据）
// ============================================================
function loadHistory() {
  // 优先使用内嵌数据（GitHub Pages 用）
  let baseData = null;
  if (typeof EMBEDDED_ARCHIVE_DATA !== 'undefined') {
    baseData = EMBEDDED_ARCHIVE_DATA;
  }
  
  // 回退到 localStorage（本地开发用）
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return baseData;
    const localData = JSON.parse(raw);
    
    // 如果有内嵌数据，合并 localStorage 中的 AI 分析结果
    if (baseData && baseData.allEntries) {
      const localEntriesMap = new Map(localData.allEntries.map(e => [e.href, e.aiAnalysis]));
      baseData.allEntries = baseData.allEntries.map(entry => {
        if (localEntriesMap.has(entry.href)) {
          return { ...entry, aiAnalysis: localEntriesMap.get(entry.href) };
        }
        return entry;
      });
      return baseData;
    }
    
    return localData;
  } catch(e) { return baseData; }
}

function saveToStorage(newData) {
  // newData: { dateA, filtered, savedAt }
  try {
    const history = loadHistory() || { snapshots: [], allEntries: [] };
    
    // 按URL去重：确保每条处罚决定书的URL唯一
    const existingUrls = new Set(history.allEntries.map(e => e.href));
    const newEntries = newData.filtered.filter(e => !existingUrls.has(e.href));
    
    const existingIdx = history.snapshots.findIndex(s => s.dateA === newData.dateA);
    const snapshot = {
      dateA: newData.dateA,
      savedAt: Date.now(),
      count: newEntries.length
    };
    
    if (existingIdx >= 0) {
      history.snapshots[existingIdx] = snapshot;
    } else {
      history.snapshots.push(snapshot);
    }
    
    // 添加新条目（带日期标记）
    history.allEntries.push(...newEntries.map(e => ({...e, _date: newData.dateA})));
    
    // 按savedAt倒序
    history.snapshots.sort((a,b) => b.savedAt - a.savedAt);
    
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch(e) { console.error('保存失败:', e); }
}

// 从AI分析文本中解析涉及准则和违规点
function parseAIAnalysis(text) {
  if (!text) return { standards: '', violations: '' };
  
  // 检查是否是错误提示（不包含准则或违规点关键词）
  const hasStandard = text.includes('《') && text.includes('》');
  const hasViolation = text.includes('违规') || text.includes('问题') || text.includes('-') || text.includes('1.');
  
  // 如果没有识别到准则和违规点格式，返回原始内容作为违规点
  if (!hasStandard && !hasViolation) {
    return { standards: '', violations: text.trim() };
  }

  // 涉及准则：只提取《》中的内容，用顿号连接
  const stdMatches = [...text.matchAll(/《[^》]+》/g)];
  const standardsClean = stdMatches.map(m => m[0]).join('、');

  // 违规点：以【违规点】为界，取其后的内容
  const vioIdx = text.search(/【?违规点】?/i);
  let violationsRaw = vioIdx >= 0 ? text.slice(vioIdx).replace(/【?违规点】?[:：]?\s*/i, '').trim() : text;
  violationsRaw = violationsRaw.replace(/\n涉及准则[：:].*$/, '').trim();

  // 清理列表前缀并重新编号
  const violationLines = violationsRaw
    .split('\n')
    .map(l => l.replace(/^[\s\-*\d.、]+/, '').trim())
    .filter(l => l.length > 5);

  const numberedViolations = violationLines
    .map((l, i) => `${i + 1}、${l}`)
    .join('\n');

  return {
    standards: standardsClean,
    violations: numberedViolations || violationsRaw || text.trim()
  };
}

// 单元格展开/收起（通过 .expanded 类控制，初始状态最多3行）
function toggleCell(id) {
  const textEl = document.getElementById(id);
  const detailEl = document.getElementById(id + '-detail');
  const btnEl = document.getElementById(id + '-btn');
  
  // 判断是 cell-text 模式还是 expand-detail 模式
  const hasDetail = detailEl !== null;
  const isExpanded = textEl && textEl.classList.contains('expanded');
  
  if (isExpanded) {
    // 收起
    if (textEl) {
      textEl.classList.remove('expanded');
      textEl.style.display = '';
    }
    if (hasDetail) {
      detailEl.classList.remove('show');
    }
    if (btnEl) btnEl.textContent = '展开';
  } else {
    // 展开
    if (textEl) {
      textEl.classList.add('expanded');
      textEl.style.display = 'block';
    }
    if (hasDetail) {
      detailEl.classList.add('show');
    }
    if (btnEl) btnEl.textContent = '收起';
  }
}

// 文字截断
function truncateText(text, maxLen) {
  if (!text) return '';
  return text.length > maxLen ? text.substring(0, maxLen) + '…' : text;
}

// ============================================================
//  AI分析
// ============================================================
async function analyzeViolation(issues, title) {
  const prompt = `# 角色
你是一个专业的资产评估违规分析助手。

# 任务
根据以下财政部行政处罚决定书的"检查发现的主要问题"内容，提取涉及准则和违规点。

政策标题：${title}

检查发现的主要问题：
${issues}

# 约束
- 必须基于最新的官方会计准则进行分析
- 输出必须简练，每个违规点只用一句话概括
- 违规点描述必须通用化，不要包含具体公司名称、具体金额、年份等案例细节
- 只输出涉及准则和违规点，不需要操作描述和合规要求
- 不得编造会计准则内容
- 如有，有几点就写几点

# 参考格式
**【涉及准则】**：《企业会计准则第X号——XX》
**【违规点】**：
- 期末可抵扣亏损不满足递延所得税资产的确认条件，导致多计递延所得税资产
- 客户已存在财务状况恶化、偿债能力不足的事实，应收坏账纳入账龄组合依据不充分`;

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时
    
    const response = await fetch(COZE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: prompt }),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const fullAnswer = await response.text();
    return fullAnswer.trim() || '分析失败';
  } catch (error) {
    if (error.name === 'AbortError') {
      console.error('AI分析请求超时');
      return '请求超时，请稍后重试';
    }
    console.error('AI分析请求失败:', error);
    return '网络错误，请稍后重试';
  }
}

// 检查分析结果是否成功（不是错误提示）
function isAnalysisSuccess(result) {
  if (!result) return false;
  const errorKeywords = ['网络错误', '请稍后重试', '分析失败', '服务器错误', '请求超时', '无法进行分析', '请提供完整', '内容不完整'];
  // 如果包含错误关键词，或者既没有准则书名号也没有违规点列表格式，认为是失败
  if (errorKeywords.some(keyword => result.includes(keyword))) return false;
  // 检查是否有实质内容（至少包含书名号或列表标记）
  const hasContent = result.includes('《') || result.includes('-') || result.includes('1.') || result.includes('1、');
  return hasContent;
}

async function analyzeHistory(idx, href) {
  const history = loadHistory();
  if (!history) return;
  const entry = history.allEntries.find(e => e.href === href);
  if (!entry) return;

  const stdId = 'std-' + idx;
  const vioId = 'vio-' + idx;
  const vioTd = document.getElementById('row-' + idx);
  if (!vioTd) return;

  // 如果已有成功的缓存，切换展开/收起
  if (entry.aiAnalysis && isAnalysisSuccess(entry.aiAnalysis)) {
    toggleCell(stdId);
    toggleCell(vioId);
    return;
  }

  // 找到分析按钮并显示"分析中"状态
  const btnSelector = vioTd.querySelector('.btn-analyze');
  if (btnSelector) {
    btnSelector.innerHTML = '<span class="spin">↻</span> 分析中...';
    btnSelector.disabled = true;
  }

  // 显示loading
  const stdDetailEl = document.getElementById(stdId + '-detail');
  const stdBtnEl = document.getElementById(stdId + '-btn');
  const vioDetailEl = document.getElementById(vioId + '-detail');
  const vioBtnEl = document.getElementById(vioId + '-btn');
  const stdTextEl = document.getElementById(stdId);
  const vioTextEl = document.getElementById(vioId);

  if (stdTextEl) { stdTextEl.textContent = '🤔 AI分析中...'; stdTextEl.classList.remove('expanded'); }
  if (vioTextEl) { vioTextEl.textContent = '🤔 AI分析中...'; vioTextEl.classList.remove('expanded'); }
  if (stdBtnEl) stdBtnEl.style.display = 'none';
  if (vioBtnEl) vioBtnEl.style.display = 'none';

  let result;
  try {
    result = await analyzeViolation(entry.issues || '', entry.title || '');
  } catch (error) {
    console.error('AI分析异常:', error);
    result = '网络错误，请稍后重试';
  }
  
  // 只有分析成功才保存到localStorage
  if (isAnalysisSuccess(result)) {
    entry.aiAnalysis = result;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    // 自动推送到 GitHub 仓库
    autoSyncAfterAnalysis();
  }

  const newParsed = parseAIAnalysis(result);

  // 填充内容
  if (stdTextEl) {
    stdTextEl.textContent = newParsed.standards;
    stdTextEl.style.display = '';
  }
  if (vioTextEl) {
    vioTextEl.textContent = newParsed.violations;
    vioTextEl.style.display = '';
  }
  
  // 恢复按钮状态（无论成功失败都要恢复）
  if (btnSelector) {
    btnSelector.disabled = false;
  }
  
  // 如果分析失败，显示重试按钮在违规点列
  if (!isAnalysisSuccess(result)) {
    // 隐藏loading，显示错误信息和重试按钮
    const vioCell = vioTd.querySelector('.td-violations');
    if (vioCell) {
      vioCell.innerHTML = `<div style="font-size:11px;color:#e74c3c;text-align:center;padding:8px 0;">
        <div style="margin-bottom:6px;">⚠️ ${escHtml(result)}</div>
        <button class="btn-goto" style="background:#e74c3c;font-size:10px;padding:4px 12px;border:none;border-radius:4px;color:#fff;cursor:pointer;" onclick="analyzeHistory('${escHtml(idx)}', ${entryIndex}, '${escHtml(date)}')">重新分析</button>
      </div>`;
    }
  } else {
    // 分析成功，更新按钮为"已分析"状态
    if (btnSelector) {
      btnSelector.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M20 6L9 17l-5-5"/></svg> 已分析';
      btnSelector.style.background = '#27ae60';
    }
    
    // 涉及准则列：首次分析时需要创建 cell-text 元素
    const stdCell = vioTd.querySelector('.td-standards');
    if (stdCell && !stdTextEl) {
      stdCell.innerHTML = `
        <div id="${stdId}" class="cell-text">${escHtml(newParsed.standards)}</div>
        <span class="cell-expand-btn" id="${stdId}-btn">展开</span>
      `;
      document.getElementById(stdId + '-btn').onclick = function() { toggleCell(stdId); };
    } else if (stdTextEl) {
      // 更新文本内容（初始状态：3行截断，不展开）
      stdTextEl.textContent = newParsed.standards;
      stdTextEl.classList.remove('expanded');
      stdTextEl.style.display = '';
      if (stdBtnEl) {
        stdBtnEl.style.display = 'inline-block';
        stdBtnEl.textContent = '展开';
      }
    }
    
    // 违规点列：首次分析完成，初始状态3行截断
    const vioCell = vioTd.querySelector('.td-violations');
    if (vioCell && !vioTextEl) {
      vioCell.innerHTML = `
        <div id="${vioId}" class="cell-text">${escHtml(newParsed.violations)}</div>
        <span class="cell-expand-btn" id="${vioId}-btn">展开</span>
        ${btnSelector ? btnSelector.outerHTML : ''}
      `;
      document.getElementById(vioId + '-btn').onclick = function() { toggleCell(vioId); };
      vioCell.classList.add('cell-ai');
      if (btnSelector) btnSelector.remove(); // 移除重复的按钮
    } else if (vioTextEl) {
      // 更新文本内容（初始状态：3行截断，不展开）
      vioTextEl.textContent = newParsed.violations;
      vioTextEl.classList.remove('expanded');
      vioTextEl.style.display = '';
      if (vioBtnEl) {
        vioBtnEl.style.display = 'inline-block';
        vioBtnEl.textContent = '展开';
      }
      vioTd.classList.add('cell-ai');
    }
  }
}

//  搜索功能
// ============================================================
function doSearchEntries(keyword, field) {
  const history = loadHistory();
  if (!history || !history.allEntries) return [];
  const allEntries = history.allEntries;
  const matchedEntries = [];
  const keywordLower = keyword.toLowerCase();
  for (const entry of allEntries) {
    let matched = false;
    const parsed = parseAIAnalysis(entry.aiAnalysis || '');
    if (field === 'all' || field === 'companies') {
      if ((entry.companies || '').toLowerCase().includes(keywordLower)) matched = true;
    }
    if (!matched && (field === 'all' || field === 'issues')) {
      if ((entry.issues || '').toLowerCase().includes(keywordLower)) matched = true;
    }
    if (!matched && (field === 'all' || field === 'standards')) {
      if (parsed.standards.toLowerCase().includes(keywordLower)) matched = true;
    }
    if (!matched && (field === 'all' || field === 'violations')) {
      if (parsed.violations.toLowerCase().includes(keywordLower)) matched = true;
    }
    if (matched) matchedEntries.push(entry);
  }
  return matchedEntries;
}

function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  const field = document.getElementById('searchField').value;
  window.__searchState = { keyword, field };

  if (!keyword) {
    clearSearch();
    return;
  }

  window.__currentPage = 1; // 搜索重置到第1页
  const matchedEntries = doSearchEntries(keyword, field);

  renderSearchResults(matchedEntries, keyword);

  const resultCountEl = document.getElementById('searchResultCount');
  if (resultCountEl) {
    resultCountEl.style.display = 'inline-block';
    resultCountEl.className = matchedEntries.length > 0 ? 'search-result-count has-result' : 'search-result-count';
    resultCountEl.textContent = `找到 ${matchedEntries.length} 条记录`;
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  window.__searchState = { keyword: '', field: 'all' };
  window.__currentPage = 1;
  const resultCountEl = document.getElementById('searchResultCount');
  if (resultCountEl) {
    resultCountEl.style.display = 'none';
    resultCountEl.textContent = '';
  }
  // 重新渲染所有数据
  renderAllHistory();
}

  }
  
  let html = `

        <span class="info-count">搜索结果：<strong>${entries.length}</strong> 条记录</span>

    </div>`;
  
  // 搜索结果一张表，按发布日期倒序

    const idx = `search_${globalSeq}`;

  }

  html += `</tbody></table></div>`;

  main.innerHTML = html;

// ============================================================
//  分页控件
// ============================================================
function getPaginationHtml(total, pageSize, currentPage) {
  const totalPages = Math.ceil(total / pageSize);
  if (totalPages <= 1) return '';

  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);
  const pages = [];
  for (let i = start; i <= end; i++) pages.push(i);

  let html = `<div class="pagination">`;
  html += `<span class="page-info">共 ${total} 条，${currentPage}/${totalPages} 页</span>`;
  html += `<button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
  html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
  for (const p of pages) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
  html += `<button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
  html += `</div>`;
  return html;
}

function goToPage(page) {
  window.__currentPage = page;
  const { keyword, field } = window.__searchState || {};
  if (keyword) {
    renderSearchResults(doSearchEntries(keyword, field), keyword);
  } else {
    renderAllHistory();
  }
}

// ============================================================
//  导出历史数据
// ============================================================
function exportHistory() {
  const history = loadHistory();
  if (!history || !history.allEntries || history.allEntries.length === 0) {
    alert('暂无数据可导出');
    return;
  }
  const excelData = history.allEntries.map(e => {
    const parsed = parseAIAnalysis(e.aiAnalysis || '');
    return {
      '归档日期': e._date || '',
      '政策发布时间': e.pubDate || '',
      '政策名称': e.title || '',
      '当事人': e.companies || '',
      '行政处罚': e.penalty || '',
      '检查发现的主要问题': e.issues || '',
      '涉及准则': parsed.standards,
      '违规点': parsed.violations
    };
  });
  const ws = XLSX.utils.json_to_sheet(excelData);
  ws['!cols'] = [
    { wch: 16 }, { wch: 16 }, { wch: 50 },
    { wch: 40 }, { wch: 40 }, { wch: 60 }, { wch: 50 }, { wch: 60 }
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '历史归档');
  const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `财监法历史归档_${dateStr}.xlsx`);
}

let __githubAIMap = new Map(); // 缓存 GitHub 上的 AI 分析结果（href -> aiAnalysis）

// 从 GitHub API 加载 AI 分析结果
async function loadGitHubAIAnalyses() {
  if (__githubAIMap.size > 0) return;
  try {
    const resp = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SYNC_FILE}`);
    if (!resp.ok) return;
    const data = await resp.json();
    const content = JSON.parse(atob(data.content));
    if (content.entries) {
      content.entries.forEach(e => {
        if (e.href && e.aiAnalysis) {
          __githubAIMap.set(e.href, e.aiAnalysis);
        }
      });
      console.log(`[INFO] 从 GitHub 加载了 ${__githubAIMap.size} 条 AI 分析结果`);
    }
  } catch(e) {
    console.warn('加载 GitHub AI 分析结果失败:', e);
  }
}

// 获取条目的 AI 分析结果（优先 localStorage，其次 GitHub）
function getEntryAIAnalysis(entry) {
  return entry.aiAnalysis || __githubAIMap.get(entry.href) || '';
}

async function init() {
  window.__currentPage = 1;
  
  // 如果有内嵌数据，先异步加载 GitHub 上的 AI 分析结果
  if (typeof EMBEDDED_ARCHIVE_DATA !== 'undefined') {
    loadGitHubAIAnalyses(); // 不等待，让它在后台加载
  }
  
  renderHistoryOverview();
  renderAllHistory();
  initColumnResize();
}

// 等待 DOM 加载完成后初始化
document.addEventListener('DOMContentLoaded', async function() {
  await init();
  
  // 搜索框回车搜索
  document.getElementById('main').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.id === 'searchInput') {
      doSearch();
    }
  });
});

// 列宽拖动功能
function initColumnResize() {
  // 移除已有的拖动把手，避免重复
  document.querySelectorAll('.resize-handle').forEach(h => h.remove());
  
  const tables = document.querySelectorAll('.data-table');
  tables.forEach(table => {
    const headers = table.querySelectorAll('thead th');
    let startX, startWidth, resizingTh;

    headers.forEach((th, index) => {
      // 最后一列不添加拖动把手
      if (index === headers.length - 1) return;
      
      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      th.appendChild(handle);

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizingTh = th;
        startX = e.pageX;
        startWidth = th.offsetWidth;
        handle.classList.add('active');
        th.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
    });

    document.addEventListener('mousemove', (e) => {
      if (!resizingTh) return;
      const diff = e.pageX - startX;
      const newWidth = Math.max(40, startWidth + diff); // 最小宽度40px
      resizingTh.style.width = newWidth + 'px';
      resizingTh.style.minWidth = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (resizingTh) {
        const handle = resizingTh.querySelector('.resize-handle');
        if (handle) handle.classList.remove('active');
        resizingTh.classList.remove('resizing');
        resizingTh = null;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });
  });
}

// ========== 同步设置弹窗 ==========
function openSyncModal() {
  document.getElementById('syncModal').classList.add('show');
  const saved = localStorage.getItem(PUSH_TOKEN_KEY);
  document.getElementById('gistToken').value = saved || '';
}
function closeSyncModal() {
  document.getElementById('syncModal').classList.remove('show');
}
function showModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.textContent = msg;
  el.className = 'modal-status ' + type;
}
async function saveAndSync() {
  const token = document.getElementById('gistToken').value.trim();
  if (!token) { showModalStatus('请填写 GitHub Token', 'error'); return; }
  localStorage.setItem(PUSH_TOKEN_KEY, token);
  showModalStatus('正在同步…', 'info');
  try {
    const pushed = await pushToRepo(token);
    if (pushed) {
      showModalStatus('✅ 同步成功！已推送 ' + pushed + ' 条分析结果到仓库', 'success');
      updateSyncBtn(true);
      setTimeout(closeSyncModal, 1800);
    } else {
      showModalStatus('⚠️ 当前没有需要同步的 AI 分析结果', 'info');
    }
  } catch(e) {
    showModalStatus('❌ 同步失败：' + e.message, 'error');
    updateSyncBtn(false);
  }
}
function updateSyncBtn(ok) {
  const btn = document.getElementById('syncBtn');
  if (!btn) return;
  const hasConfig = !!localStorage.getItem(PUSH_TOKEN_KEY);
  if (ok) {
    btn.classList.add('synced'); btn.classList.remove('error');
    document.getElementById('syncBtnIcon').textContent = '✅';
    document.getElementById('syncBtnText').textContent = '已同步';
  } else if (hasConfig) {
    btn.classList.add('error'); btn.classList.remove('synced');
    document.getElementById('syncBtnIcon').textContent = '⚠️';
    document.getElementById('syncBtnText').textContent = '同步异常';
  } else {
    btn.classList.remove('synced', 'error');
    document.getElementById('syncBtnIcon').textContent = '☁️';
    document.getElementById('syncBtnText').textContent = '同步设置';
  }
}
document.addEventListener('DOMContentLoaded', updateSyncBtn);
